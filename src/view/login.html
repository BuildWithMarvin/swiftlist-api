<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles/output.css" />
  </head>
  <body>
    <div class="flex flex-col md:flex-row min-h-screen">
      <!-- Left Section -->
      <div
        class="bg-blue-500 text-white p-8 md:p-12 md:w-1/2 relative overflow-hidden"
      >
        <div class="z-10 relative">
          <h2 class="text-2xl font-bold mb-6">Your Logo</h2>
          <div class="mt-20 md:mt-32">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Sign in to</h1>
            <h2 class="text-2xl md:text-3xl font-semibold mb-6">
              Lorem Ipsum is simply
            </h2>
            <p class="max-w-md opacity-90">
              Lorem Ipsum is simply dummy text of the printing and typesetting
              industry. Lorem Ipsum has been the industry's standard dummy text
              ever since the 1500s.
            </p>
          </div>
        </div>
      </div>

      <!-- Right Section -->
      <div class="p-8 md:p-12 md:w-1/2 flex items-center justify-center">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-8">
          <div class="text-right mb-4">
            <span class="text-gray-500">No Account?</span>
            <a href="#" class="text-blue-500 font-medium">Sign up</a>
          </div>

          <div class="mb-8">
            <p class="text-gray-600 mb-1">
              Welcome to <span class="text-blue-500 font-bold">Swiftlist</span>
            </p>
            <h1 class="text-4xl font-bold">Sign in</h1>
          </div>

          <!-- Social Login Buttons -->
          <div class="flex flex-col space-y-4 mb-8">
            <button
              class="flex items-center justify-center gap-2 h-12 border border-gray-200 rounded-md hover:bg-gray-50"
            >
              <svg
                width="24"
                height="24"
                viewBox="-3 0 262 262"
                xmlns="http://www.w3.org/2000/svg"
                preserveAspectRatio="xMidYMid"
                fill="#000000"
              >
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g
                  id="SVGRepo_tracerCarrier"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    d="M255.878 133.451c0-10.734-.871-18.567-2.756-26.69H130.55v48.448h71.947c-1.45 12.04-9.283 30.172-26.69 42.356l-.244 1.622 38.755 30.023 2.685.268c24.659-22.774 38.875-56.282 38.875-96.027"
                    fill="#4285F4"
                  ></path>
                  <path
                    d="M130.55 261.1c35.248 0 64.839-11.605 86.453-31.622l-41.196-31.913c-11.024 7.688-25.82 13.055-45.257 13.055-34.523 0-63.824-22.773-74.269-54.25l-1.531.13-40.298 31.187-.527 1.465C35.393 231.798 79.49 261.1 130.55 261.1"
                    fill="#34A853"
                  ></path>
                  <path
                    d="M56.281 156.37c-2.756-8.123-4.351-16.827-4.351-25.82 0-8.994 1.595-17.697 4.206-25.82l-.073-1.73L15.26 71.312l-1.335.635C5.077 89.644 0 109.517 0 130.55s5.077 40.905 13.925 58.602l42.356-32.782"
                    fill="#FBBC05"
                  ></path>
                  <path
                    d="M130.55 50.479c24.514 0 41.05 10.589 50.479 19.438l36.844-35.974C195.245 12.91 165.798 0 130.55 0 79.49 0 35.393 29.301 13.925 71.947l42.211 32.783c10.59-31.477 39.891-54.251 74.414-54.251"
                    fill="#EB4335"
                  ></path>
                </g>
              </svg>
            </button>
            <div class="flex gap-4">
              <button
                class="flex-1 h-12 border border-gray-200 rounded-md hover:bg-gray-50"
              >
                <svg
                  width="24"
                  height="24"
                  viewBox="38.657999999999994 12.828 207.085 207.085"
                  xmlns="http://www.w3.org/2000/svg"
                  fill="#000000"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g
                    id="SVGRepo_tracerCarrier"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></g>
                  <g id="SVGRepo_iconCarrier">
                    <path
                      d="M158.232 219.912v-94.461h31.707l4.747-36.813h-36.454V65.134c0-10.658 2.96-17.922 18.245-17.922l19.494-.009V14.278c-3.373-.447-14.944-1.449-28.406-1.449-28.106 0-47.348 17.155-47.348 48.661v27.149H88.428v36.813h31.788v94.461l38.016-.001z"
                      fill="#3c5a9a"
                    ></path>
                  </g>
                </svg>
              </button>
              <button
                class="flex-1 h-12 border border-gray-200 rounded-md hover:bg-gray-50"
              >
                <svg
                  fill="#000000"
                  width="24"
                  height="24"
                  viewBox="0 0 560.03 560.03"
                  xmlns="http://www.w3.org/2000/svg"
                  stroke="#000000"
                >
                  <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                  <g
                    id="SVGRepo_tracerCarrier"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  ></g>
                  <g id="SVGRepo_iconCarrier">
                    <path
                      d="M380.844 297.529c.787 84.752 74.349 112.955 75.164 113.314-.622 1.988-11.754 40.191-38.756 79.652-23.343 34.117-47.568 68.107-85.731 68.811-37.499.691-49.557-22.236-92.429-22.236-42.859 0-56.256 21.533-91.753 22.928-36.837 1.395-64.889-36.891-88.424-70.883-48.093-69.53-84.846-196.475-35.496-282.165 24.516-42.554 68.328-69.501 115.882-70.192 36.173-.69 70.315 24.336 92.429 24.336 22.1 0 63.59-30.096 107.208-25.676 18.26.76 69.517 7.376 102.429 55.552-2.652 1.644-61.159 35.704-60.523 106.559M310.369 89.418C329.926 65.745 343.089 32.79 339.498 0 311.308 1.133 277.22 18.785 257 42.445c-18.121 20.952-33.991 54.487-29.709 86.628 31.421 2.431 63.52-15.967 83.078-39.655"
                    ></path>
                  </g>
                </svg>
              </button>
            </div>
          </div>

          <form action="/validate" method="POST" class="form">
            <div class="space-y-6">
              <div class="space-y-2">
                <label
                  for="email"
                  class="block text-sm font-medium text-gray-700"
                >
                  Enter your username or email address
                </label>
                <input
                  type="text"
                  id="username"
                  name="username"
                  required
                  placeholder="Username or email address"
                  class="w-full h-12 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
              </div>

              <div class="space-y-2">
                <label
                  for="password"
                  class="block text-sm font-medium text-gray-700"
                >
                  Enter your Password
                </label>
                <input
                  name="password"
                  id="password"
                  type="password"
                  placeholder="Password"
                  class="w-full h-12 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
                <div class="text-right">
                  <a href="#" class="text-blue-500 text-sm">Forgot Password</a>
                </div>
              </div>

              <button
                type="submit"
                class="w-full h-12 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-md transition duration-200"
              >
                Sign in
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
